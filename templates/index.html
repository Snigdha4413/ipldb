<!DOCTYPE html>
<html>
<head>
<title>IPL Auction</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>IPL Player Auction</h1>

<div class="players">

{% for p in players %}

<div class="card">

<h2>{{p.name}}</h2>

<p>{{p.country}}</p>

<p>{{p.role}}</p>

<p>Current Bid: ₹{{p.highest_bid}}</p>

<a href="/player/{{p.id}}">
<button>Open Auction</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
