<!DOCTYPE html>
<html>
<head>
  <title>IPL Auction</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🏏</span>
      <span class="topbar-title">IPL Auction</span>
    </div>
    <div class="topbar-right">
      <span class="badge {% if is_admin %}badge-admin{% else %}badge-client{% endif %}">
        {{ "👁️ Admin" if is_admin else "🙋 Client" }}
      </span>
      <span class="username">{{ user }}</span>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </div>

  <div class="page-header">
    <h2>Select a Team</h2>
    <p>Click on a team to view players and place bids</p>
  </div>

  <div class="teams-grid">
    {% for t in teams %}
    <a href="/team/{{ t.team }}" class="team-card">
      <div class="team-icon">🏟️</div>
      <h2>{{ t.team }}</h2>
      <span class="view-label">View Players →</span>
    </a>
    {% endfor %}
  </div>

</body>
</html>
