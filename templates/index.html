<!DOCTYPE html>
<html>

<head>
<title>IPL Auction</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>IPL Auction Platform</h1>

<div class="players">

{% for p in players %}

<div class="card">

<h2>{{p.name}}</h2>

<p>Country: {{p.country}}</p>
<p>Team: {{p.team}}</p>
<p>Current Bid: ₹{{p.current_bid}}</p>

<a href="/player/{{p.id}}">
<button>View & Bid</button>
</a>

</div>

{% endfor %}

</div>

</body>

</html>
